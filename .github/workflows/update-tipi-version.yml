name: Update tipi_version on Renovate PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/**/docker-compose.json'
      - 'apps/**/config.json'
      - 'apps/**/metadata/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-apply tipi_version bump'
        required: true
        type: number

jobs:
  update-tipi-version:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Get PR info for workflow_dispatch
        id: pr
        if: github.event_name == 'workflow_dispatch'
        run: |
          pr_data=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefName)
          echo "head_ref=$(echo "$pr_data" | jq -r '.headRefName')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && steps.pr.outputs.head_ref || github.event.pull_request.head.ref }}
          repository: ${{ github.event_name == 'workflow_dispatch' && github.repository || github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          # Push the bump commit with a PAT, not GITHUB_TOKEN. GITHUB_TOKEN pushes
          # don't fire pull_request events, so CI never reports a PR-linked `ci`
          # check and the required-status-check gate stays unsatisfied (PR BLOCKED).
          # A PAT push fires `synchronize`, so ci.yml runs natively and its check is
          # linked to the PR. The PAT owner is not renovate[bot], so the resulting
          # synchronize re-run of THIS workflow is skipped by the actor gate above.
          token: ${{ secrets.BUMP_PAT }}

      - name: Setup git remote
        run: |
          repo=${{ github.event_name == 'workflow_dispatch' && github.repository || github.event.pull_request.head.repo.full_name }}
          git remote set-url origin "https://x-access-token:${{ secrets.BUMP_PAT }}@github.com/${repo}.git"

      - name: Read BUN_IMAGE from Makefile
        id: bun
        run: echo "image=$(sed -n 's/^BUN_IMAGE ?= //p' Makefile)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: docker run --rm -v "$PWD:/app" -w /app ${{ steps.bun.outputs.image }} bun install --ignore-scripts

      - name: Get changed files
        id: changed
        run: |
          base_ref=${{ github.event_name == 'workflow_dispatch' && 'main' || github.event.pull_request.base.ref }}
          git fetch origin "$base_ref"
          files=$(git diff --name-only "origin/${base_ref}...HEAD" | grep 'docker-compose.json' | tr '\n' ' ')
          echo "files=$files" >> $GITHUB_OUTPUT
          echo "Changed docker-compose.json files: $files"

      - name: Update config.json for each changed app
        if: steps.changed.outputs.files != ''
        run: |
          for file in ${{ steps.changed.outputs.files }}; do
            if [[ -f "$file" ]]; then
              app_dir=$(dirname "$file")
              config_file="$app_dir/config.json"

              if [[ -f "$config_file" ]]; then
                # Extract package name and new version from the isMain service
                main_image=$(jq -r '.services[] | select(.isMain == true) | .image' "$file")
                package_name=$(echo "$main_image" | cut -d: -f1)
                new_version=$(echo "$main_image" | cut -d: -f2-)

                if [[ -n "$new_version" ]]; then
                  echo "Updating $config_file: version=$new_version, package=$package_name"
                  docker run --rm -v "$PWD:/app" -w /app ${{ steps.bun.outputs.image }} bun run scripts/update-config.ts "$file" "$new_version" "$package_name"
                  echo "Updated tipi_version and updated_at in $config_file"
                fi
              fi
            fi
          done

      - name: Format updated files
        if: steps.changed.outputs.files != ''
        run: docker run --rm -v "$PWD:/app" -w /app ${{ steps.bun.outputs.image }} bun run lint

      - name: Regenerate README
        run: make readme

      - name: Commit and push changes
        id: commit
        run: |
          head_ref=${{ github.event_name == 'workflow_dispatch' && steps.pr.outputs.head_ref || github.event.pull_request.head.ref }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/*/config.json README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: sync renovate metadata and readme"
            git push origin "HEAD:${head_ref}"
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      # The bump push fires a `synchronize` event, so ci.yml runs natively and its
      # check is linked to the PR head — no manual workflow_dispatch needed.
      # That same push disables the native auto-merge Renovate armed at PR creation,
      # so re-arm it here for automerge-labelled PRs. GitHub then merges (squash)
      # once the required `ci` check goes green. GITHUB_TOKEN suffices (PR write).
      - name: Re-enable auto-merge on automerge PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
        run: |
          if gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels \
               --jq '.labels[].name' | grep -qx 'automerge'; then
            gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --auto --squash
          else
            echo "PR #$PR_NUMBER has no 'automerge' label; skipping auto-merge."
          fi
